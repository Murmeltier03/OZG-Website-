<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Printable Resident Parking Permit Form</title>
    <style>
      body {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 24px;
        color: #132033;
        font-family: Arial, sans-serif;
        line-height: 1.5;
      }

      h1 {
        margin-bottom: 8px;
      }

      .notice {
        padding: 14px;
        border: 2px solid #b34242;
        background: #fff0f0;
      }

      label {
        display: block;
        margin-top: 20px;
        font-weight: 700;
      }

      .line {
        height: 34px;
        border-bottom: 1px solid #132033;
      }

      @media print {
        body {
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>Resident Parking Permit - Paper Form</h1>
    <p class="notice">This demo form represents the media break: print it, sign it by hand and mail it to the city office.</p>

    <label>Full name</label>
    <div class="line"></div>

    <label>Main residence</label>
    <div class="line"></div>

    <label>License plate</label>
    <div class="line"></div>

    <label>Signature</label>
    <div class="line"></div>
  </body>
</html>
